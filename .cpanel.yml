---
deployment:
  tasks:
    - export DEPLOYPATH=/home/cresijjl/stekoratech.com/
    - export REPOPATH=/home/cresijjl/repositories/stekora-uzi/
    - cd $REPOPATH
    - npm install
    - npm --prefix frontend install
    - npm --prefix frontend run build
    - /bin/rm -rf $DEPLOYPATH/assets
    - /bin/rm -f $DEPLOYPATH/index.html
    - /bin/cp -R $REPOPATH/frontend/dist/* $DEPLOYPATH